<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>めしコロ 🍙</title>

<!-- PWA -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="めしコロ">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f5f0e8">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" id="apple-icon" href="">

<!-- 横画面ロック -->
<style>
@media screen and (orientation: landscape) {
  #rotate-msg { display:flex !important; }
  #app-root    { display:none !important; }
}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Kaisei+Tokumin:wght@400;700;800&family=DotGothic16&display=swap');

:root {
  --bg:     #f5f0e8;
  --panel:  #efe9dc;
  --card:   #ffffff;
  --accent: #d4622a;
  --accent2:#b8860b;
  --green:  #2a7a5e;
  --text:   #2c2118;
  --muted:  #8a7560;
  --border: rgba(180,120,60,0.18);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; overflow:hidden; background:var(--bg); }

/* 横向きメッセージ */
#rotate-msg {
  display:none;
  position:fixed; inset:0; z-index:9999;
  background:var(--bg);
  align-items:center; justify-content:center;
  flex-direction:column; gap:12px;
  font-family:'Kaisei Tokumin',serif; color:var(--text); font-size:18px;
}

#app-root {
  display:flex; flex-direction:column; height:100%;
}

/* ── HEADER ── */
header {
  height:54px; flex-shrink:0;
  background:var(--panel);
  border-bottom:1px solid var(--border);
  display:flex; align-items:center;
  padding:0 16px; gap:12px; z-index:50;
}
.logo { font-family:'DotGothic16',monospace; font-size:20px; color:var(--accent); letter-spacing:2px; }
.logo em { color:var(--accent2); font-style:normal; }
.nav-tabs { display:flex; gap:4px; margin-left:auto; }
.nav-tab {
  background:none; border:1px solid transparent; border-radius:8px;
  color:var(--muted); font-family:'DotGothic16',monospace; font-size:12px;
  padding:5px 12px; cursor:pointer; transition:all 0.2s;
}
.nav-tab.active { border-color:var(--accent); color:var(--accent); background:rgba(212,98,42,0.08); }

/* ── VIEWS ── */
#app { flex:1; overflow:hidden; position:relative; min-height:0; }
.view { display:none; height:100%; flex-direction:column; }
.view.active { display:flex; }

/* ── TODAY ── */
#today-stats {
  flex-shrink:0; background:var(--panel);
  border-bottom:1px solid var(--border);
  padding:8px 16px; display:flex; gap:20px; align-items:center;
}
.t-stat { text-align:center; }
.t-stat-num { font-size:20px; font-weight:800; color:var(--accent2); line-height:1; }
.t-stat-lbl { font-size:10px; color:var(--muted); margin-top:2px; font-family:'DotGothic16',monospace; }

#canvas-wrap { flex:1; position:relative; overflow:hidden; min-height:0; }
canvas { display:block; position:absolute; top:0; left:0; }

#hint-msg {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-60%);
  text-align:center; color:rgba(44,33,24,0.2); pointer-events:none;
}
#hint-msg .big { font-size:56px; margin-bottom:8px; }
#hint-msg p { font-size:13px; line-height:1.7; }

/* ── ACTION BAR ── */
#action-bar {
  flex-shrink:0; background:var(--panel);
  border-top:1px solid var(--border);
  padding:10px 16px; display:flex; gap:8px; align-items:center;
}
#file-input { display:none; }

.btn {
  border:none; border-radius:10px; padding:10px 16px;
  font-family:'DotGothic16',monospace; font-size:12px;
  cursor:pointer; transition:all 0.18s;
  display:flex; align-items:center; gap:6px; white-space:nowrap;
}
.btn:active { transform:scale(0.95); }
.btn-primary {
  background:var(--accent); color:#fff; flex:1; justify-content:center;
  font-size:13px; box-shadow:0 3px 16px rgba(212,98,42,0.3);
}
.btn-secondary {
  background:var(--card); color:var(--text); border:1px solid var(--border);
}
.btn-secondary:hover { border-color:var(--accent2); }

/* ジャイロボタン */
#gyro-btn.gyro-on {
  border-color:var(--green); color:var(--green);
  background:rgba(42,122,94,0.1);
  animation:gyroPulse 1.8s ease-in-out infinite;
}
@keyframes gyroPulse {
  0%,100% { box-shadow:0 0 0 0 rgba(42,122,94,0.3); }
  50%      { box-shadow:0 0 0 6px rgba(42,122,94,0); }
}

/* ── CALENDAR ── */
#view-calendar { overflow:hidden; }
#cal-header {
  flex-shrink:0; display:flex; align-items:center;
  justify-content:space-between; padding:14px 20px;
  background:var(--panel); border-bottom:1px solid var(--border);
}
#cal-month-label { font-family:'DotGothic16',monospace; font-size:16px; color:var(--accent2); }
.cal-nav-btn {
  background:var(--card); border:1px solid var(--border); border-radius:8px;
  color:var(--text); width:32px; height:32px; cursor:pointer; font-size:16px;
  display:flex; align-items:center; justify-content:center; transition:all 0.15s;
}
.cal-nav-btn:hover { border-color:var(--accent); color:var(--accent); }
#cal-grid-wrap { flex:1; overflow-y:auto; padding:12px; }
.cal-dow-row { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; margin-bottom:4px; }
.cal-dow { text-align:center; font-family:'DotGothic16',monospace; font-size:10px; color:var(--muted); padding:4px 0; }
.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
.cal-cell {
  aspect-ratio:1; background:var(--card); border-radius:8px;
  border:1px solid transparent; padding:4px; cursor:pointer;
  transition:all 0.15s; overflow:hidden; display:flex;
  flex-direction:column; min-height:52px;
}
.cal-cell:hover { border-color:var(--accent); }
.cal-cell.today { border-color:var(--accent2); }
.cal-cell.selected { background:rgba(212,98,42,0.1); border-color:var(--accent); }
.cal-cell.empty { background:transparent; cursor:default; border-color:transparent; }
.cal-day-num { font-size:11px; color:var(--muted); font-family:'DotGothic16',monospace; line-height:1; }
.cal-cell.today .cal-day-num { color:var(--accent2); font-weight:700; }
.cal-emojis { font-size:13px; line-height:1.3; flex:1; overflow:hidden; word-break:break-all; }
.cal-kcal { font-size:9px; color:var(--green); font-family:'DotGothic16',monospace; margin-top:auto; }

/* ── DAY DETAIL ── */
#day-detail { position:fixed; inset:0; z-index:200; display:none; align-items:flex-end; }
#day-detail.open { display:flex; }
#day-detail-backdrop { position:absolute; inset:0; background:rgba(30,15,5,0.45); }
#day-detail-sheet {
  position:relative; z-index:1; width:100%; max-height:70vh;
  background:var(--panel); border-top:2px solid var(--accent);
  border-radius:16px 16px 0 0; padding:16px; overflow-y:auto;
  animation:slideUp 0.25s ease;
}
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
#day-detail-title { font-family:'DotGothic16',monospace; color:var(--accent2); font-size:14px; margin-bottom:12px; }
#day-detail-summary { display:flex; gap:16px; margin-bottom:14px; }
.ds-stat { text-align:center; flex:1; background:var(--card); border-radius:8px; padding:8px; }
.ds-num { font-size:20px; font-weight:800; color:var(--accent); }
.ds-lbl { font-size:10px; color:var(--muted); font-family:'DotGothic16',monospace; }
#day-detail-list { display:flex; flex-direction:column; gap:8px; }
.detail-item {
  display:flex; align-items:center; gap:10px; background:var(--card);
  border-radius:10px; padding:10px 12px; border:1px solid transparent;
}
.detail-emoji { font-size:26px; flex-shrink:0; }
.detail-info { flex:1; }
.detail-name { font-size:14px; font-weight:700; }
.detail-cal { font-size:11px; color:var(--green); font-family:'DotGothic16',monospace; }
.detail-actions { display:flex; gap:6px; }
.icon-btn {
  background:none; border:1px solid var(--border); border-radius:6px;
  color:var(--muted); width:32px; height:32px; cursor:pointer; font-size:14px;
  display:flex; align-items:center; justify-content:center; transition:all 0.15s;
}
.icon-btn:hover { border-color:var(--accent); color:var(--accent); }
.icon-btn.del:hover { border-color:#b42820; color:#b42820; }

/* ── FOOD MENU (タップメニュー) ── */
#food-menu {
  position:fixed; bottom:80px; left:50%; transform:translateX(-50%);
  background:var(--card); border:1px solid var(--border); border-radius:16px;
  padding:12px 16px; z-index:600; display:none;
  gap:10px; box-shadow:0 4px 24px rgba(0,0,0,0.15); align-items:center;
  animation:fadeInUp 0.2s ease;
}
#food-menu.show { display:flex; }
@keyframes fadeInUp { from{opacity:0;transform:translateX(-50%) translateY(8px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
.food-menu-name { font-size:13px; font-weight:700; color:var(--text); max-width:90px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.food-menu-btn {
  background:var(--panel); border:1px solid var(--border); border-radius:8px;
  padding:7px 14px; font-size:13px; cursor:pointer; color:var(--text);
  font-family:'DotGothic16',monospace;
}
.food-menu-btn.del { background:#fff0f0; border-color:#ffcccc; color:#b42820; }
.food-menu-close {
  background:none; border:none; font-size:20px; cursor:pointer;
  color:var(--muted); padding:0 2px; line-height:1;
}

/* ── MODALS ── */
.modal-overlay {
  position:fixed; inset:0; z-index:300; background:rgba(30,15,5,0.5);
  display:none; align-items:center; justify-content:center; padding:20px;
}
.modal-overlay.open { display:flex; }
.modal {
  background:var(--panel); border:1px solid var(--border); border-radius:16px;
  padding:20px; width:100%; max-width:360px; animation:fadeInScale 0.2s ease;
}
@keyframes fadeInScale { from{opacity:0;transform:scale(0.93)} to{opacity:1;transform:scale(1)} }
.modal h3 { font-family:'DotGothic16',monospace; color:var(--accent2); font-size:14px; margin-bottom:14px; }
.form-group { margin-bottom:12px; }
.form-group label { display:block; font-size:11px; color:var(--muted); font-family:'DotGothic16',monospace; margin-bottom:5px; }
.form-group input {
  width:100%; background:var(--card); border:1px solid var(--border);
  border-radius:8px; color:var(--text); padding:9px 12px;
  font-family:'Kaisei Tokumin',serif; font-size:14px; outline:none; transition:border-color 0.15s;
}
.form-group input:focus { border-color:var(--accent); }
.emoji-picker { display:flex; flex-wrap:wrap; gap:6px; margin-top:6px; }
.emoji-opt {
  background:var(--card); border:1px solid var(--border); border-radius:6px;
  width:36px; height:36px; font-size:20px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; transition:all 0.12s;
}
.emoji-opt.selected { border-color:var(--accent); background:rgba(212,98,42,0.1); }
.modal-actions { display:flex; gap:8px; margin-top:16px; }
.modal-actions .btn { flex:1; justify-content:center; }
.btn-cancel { background:var(--card); color:var(--muted); border:1px solid var(--border); }

/* ── LOADING / TOAST ── */
#loading {
  position:fixed; inset:0; z-index:400; background:rgba(245,240,232,0.88);
  display:none; flex-direction:column; align-items:center; justify-content:center; gap:14px;
}
#loading.show { display:flex; }
.spin { width:44px; height:44px; border:3px solid rgba(212,98,42,0.2); border-top-color:var(--accent); border-radius:50%; animation:spin 0.75s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
.load-txt { font-family:'DotGothic16',monospace; font-size:13px; color:var(--accent); letter-spacing:2px; }

#toast {
  position:fixed; bottom:90px; left:50%;
  transform:translateX(-50%) translateY(10px);
  background:var(--card); border:1px solid var(--accent); border-radius:12px;
  padding:9px 18px; font-size:13px; opacity:0; transition:all 0.28s;
  z-index:500; pointer-events:none; white-space:nowrap;
}
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* 広告オフバナー */
#ad-banner-area {
  flex-shrink: 0;
  background: linear-gradient(135deg, rgba(212,98,42,0.08), rgba(184,134,11,0.08));
  border-bottom: 1px solid var(--border);
}
#ad-banner-inner {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 7px 16px;
  cursor: pointer;
  font-family: 'DotGothic16', monospace;
  font-size: 12px;
  color: var(--muted);
}
#ad-banner-inner:active { opacity: 0.7; }
#ad-banner-inner span.highlight { color: var(--accent2); font-weight: bold; }

::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

/* ファイルinputをiOS含め確実に非表示 */
input[type=file] {
  position:fixed !important;
  top:-9999px !important;
  left:-9999px !important;
  width:1px !important;
  height:1px !important;
  opacity:0 !important;
  pointer-events:none !important;
}
</style>
</head>
<body>

<!-- 共通ファイルinput（body直下に1つだけ、完全に非表示） -->
<input type="file" id="shared-file-input" accept="image/*" capture="environment"
  style="position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;opacity:0;"
  onchange="handleSharedFile(event)">

<!-- 横向きメッセージ -->
<div id="rotate-msg">
  <div style="font-size:48px">📱</div>
  <div>縦向きにしてください</div>
</div>

<div id="app-root">
  <header>
    <div class="logo">めし<em>コロ</em> 🍙</div>
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="showView('today')">今日</button>
      <button class="nav-tab" onclick="showView('calendar')">カレンダー</button>
    </div>
  </header>
  <!-- 広告オフバナー（プレミアム未加入時のみJSで表示） -->
  <div id="ad-banner-area"></div>

  <div id="app">

    <!-- TODAY VIEW -->
    <div id="view-today" class="view active">
      <div id="today-stats">
        <div class="t-stat">
          <div class="t-stat-num" id="stat-count">0</div>
          <div class="t-stat-lbl">食事数</div>
        </div>
        <div class="t-stat">
          <div class="t-stat-num" id="stat-cal">0</div>
          <div class="t-stat-lbl">kcal</div>
        </div>
        <div class="t-stat">
          <div class="t-stat-num" id="stat-last" style="font-size:14px">—</div>
          <div class="t-stat-lbl">最新</div>
        </div>
      </div>

      <div id="canvas-wrap">
        <div id="hint-msg">
          <div class="big">🍽️</div>
          <p>📸 撮影 または ✏️ 入力で<br>今日の食事を記録しよう</p>
        </div>
        <canvas id="world"></canvas>
      </div>

      <div id="action-bar">
        <button class="btn btn-primary" onclick="triggerFileInput('today')">
          📸 撮影して追加
        </button>
        <button class="btn btn-secondary" onclick="openManualModal()">✏️ 手入力</button>
        <button class="btn btn-secondary" id="gyro-btn" onclick="requestGyro()">📱</button>
      </div>
    </div>

    <!-- DATE VIEW（過去・未来の日付用） -->
    <div id="view-date" class="view">
      <div id="date-stats" style="flex-shrink:0;background:var(--panel);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;gap:12px;align-items:center;">
        <button class="btn btn-secondary" style="padding:6px 10px;font-size:18px;" onclick="showView('calendar')">‹</button>
        <div style="flex:1;text-align:center;">
          <div id="date-view-label" style="font-family:'DotGothic16',monospace;font-size:13px;color:var(--accent2);"></div>
        </div>
        <div class="t-stat">
          <div class="t-stat-num" id="date-stat-count">0</div>
          <div class="t-stat-lbl">食事数</div>
        </div>
        <div class="t-stat">
          <div class="t-stat-num" id="date-stat-cal">0</div>
          <div class="t-stat-lbl">kcal</div>
        </div>
      </div>

      <div id="date-canvas-wrap" style="flex:1;position:relative;overflow:hidden;min-height:0;">
        <div id="date-hint-msg" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-60%);text-align:center;color:rgba(44,33,24,0.2);pointer-events:none;">
          <div style="font-size:56px;margin-bottom:8px;">🍽️</div>
          <p style="font-size:13px;line-height:1.7;">📸 撮影 または ✏️ 入力で<br>この日の食事を記録しよう</p>
        </div>
        <canvas id="date-world"></canvas>
      </div>

      <div id="date-action-bar" style="flex-shrink:0;background:var(--panel);border-top:1px solid var(--border);padding:10px 16px;display:flex;gap:8px;align-items:center;">
        <button class="btn btn-primary" style="flex:1;justify-content:center;font-size:13px;" onclick="triggerFileInput('date')">
          📸 撮影して追加
        </button>
        <button class="btn btn-secondary" onclick="openManualModal(currentDateViewKey)">✏️ 手入力</button>
        <button class="btn btn-secondary" id="gyro-btn2" onclick="requestGyro()">📱</button>
      </div>
    </div>

    <!-- CALENDAR VIEW -->
    <div id="view-calendar" class="view">
      <div id="cal-header">
        <button class="cal-nav-btn" onclick="changeMonth(-1)">‹</button>
        <div id="cal-month-label"></div>
        <button class="cal-nav-btn" onclick="changeMonth(1)">›</button>
      </div>
      <div id="cal-grid-wrap">
        <div class="cal-dow-row">
          <div class="cal-dow">日</div><div class="cal-dow">月</div>
          <div class="cal-dow">火</div><div class="cal-dow">水</div>
          <div class="cal-dow">木</div><div class="cal-dow">金</div>
          <div class="cal-dow">土</div>
        </div>
        <div class="cal-grid" id="cal-grid"></div>
      </div>
    </div>

  </div><!-- #app -->
</div><!-- #app-root -->

<!-- ジャイロデバッグ表示（確認後に削除） -->
<div id="gyro-debug" style="
  display:none; position:fixed; top:60px; left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,0.75); color:#fff;
  font-family:monospace; font-size:13px;
  padding:8px 14px; border-radius:8px; z-index:999;
  pointer-events:none; white-space:nowrap;
"></div>

<!-- FOOD MENU (タップ時) -->
<div id="food-menu">
  <span id="fm-emoji" style="font-size:24px"></span>
  <span class="food-menu-name" id="fm-name"></span>
  <button class="food-menu-btn" id="fm-edit">✏️ 編集</button>
  <button class="food-menu-btn del" id="fm-delete">🗑️ 削除</button>
  <button class="food-menu-close" onclick="hideFoodMenu()">×</button>
</div>

<!-- DAY DETAIL -->
<div id="day-detail">
  <div id="day-detail-backdrop" onclick="closeDayDetail()"></div>
  <div id="day-detail-sheet">
    <div id="day-detail-title"></div>
    <div id="day-detail-summary"></div>
    <div id="day-detail-list"></div>
    <button class="btn btn-primary" id="day-add-btn" style="margin-top:12px;width:100%;justify-content:center" onclick="openPastAddModal()">
      ＋ この日に食事を追加
    </button>
    <button class="btn btn-cancel" style="margin-top:8px;width:100%;justify-content:center" onclick="closeDayDetail()">閉じる</button>
  </div>
</div>

<!-- MANUAL MODAL -->
<div class="modal-overlay" id="manual-modal">
  <div class="modal">
    <h3>✏️ 食事を手入力</h3>
    <div class="form-group">
      <label>料理名</label>
      <input type="text" id="m-name" placeholder="例：カレーライス" maxlength="30">
    </div>
    <div class="form-group">
      <label>カロリー (kcal)</label>
      <input type="number" id="m-cal" placeholder="例：500" min="0" max="5000">
    </div>
    <div class="form-group">
      <label>絵文字</label>
      <div class="emoji-picker" id="manual-emoji-picker"></div>
    </div>
    <div class="form-group">
      <label>色</label>
      <input type="color" id="m-color" value="#d4622a" style="height:36px;padding:2px 6px;cursor:pointer">
    </div>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeManualModal()">キャンセル</button>
      <button class="btn btn-primary" onclick="submitManual()">追加 🍽️</button>
    </div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <h3>✏️ 食事を編集</h3>
    <div class="form-group">
      <label>料理名</label>
      <input type="text" id="e-name" maxlength="30">
    </div>
    <div class="form-group">
      <label>カロリー (kcal)</label>

      <button class="btn btn-primary" onclick="submitEdit()">保存</button>

</div>

<div id="loading"><div class="spin"></div><div class="load-txt">AI解析中...</div></div>
<div id="toast"></div>

<!-- カメラUI（丸いガイド付きシャッター画面） -->
<div id="camera-ui" style="display:none;position:fixed;inset:0;z-index:900;background:#000;flex-direction:column;align-items:center;justify-content:center;">
  <div style="position:relative;width:100%;flex:1;overflow:hidden;">
    <video id="camera-video" autoplay playsinline muted style="width:100%;height:100%;object-fit:cover;"></video>
    <!-- 暗いオーバーレイ + 丸い穴 -->

    <div style="position:absolute;top:16px;width:100%;text-align:center;color:#fff;font-family:'DotGothic16',monospace;font-size:13px;text-shadow:0 1px 4px rgba(0,0,0,0.8);">
      丸の中に食べ物を入れてね 🍽️
    </div>
  </div>

    <button id="shutter-btn" onclick="takePhoto()" style="background:#fff;border:none;border-radius:50%;width:70px;height:70px;font-size:32px;cursor:pointer;box-shadow:0 0 0 4px rgba(255,255,255,0.3);">📸</button>
    <div style="width:50px;"></div>
  </div>
</div>

<script>
'use strict';

// ══════════════════════════════════════
// DATA STORE
// ══════════════════════════════════════
const todayKey = () => new Date().toISOString().slice(0,10);
const getStore = () => { try { return JSON.parse(localStorage.getItem('meshikoroV3')||'{}'); } catch{ return {}; } };
const saveStore = s => localStorage.setItem('meshikoroV3', JSON.stringify(s));
const getDay  = d => { const s=getStore(); return s[d]||[]; };
const saveDay = (d,items) => { const s=getStore(); s[d]=items; saveStore(s); };

// ══════════════════════════════════════
// PHYSICS ENGINE
// ══════════════════════════════════════
const { Engine, Runner, Bodies, Body, World, Events, Mouse, MouseConstraint } = Matter;

const engine  = Engine.create({ gravity:{ x:0, y:1.5 } });
const canvasEl = document.getElementById('world');
const wrapEl   = document.getElementById('canvas-wrap');
const ctx      = canvasEl.getContext('2d');

function getCanvasSize() {
  const r = wrapEl.getBoundingClientRect();
  return {
    W: Math.floor(r.width)  || window.innerWidth,
    H: Math.floor(r.height) || 400
  };
}

let { W, H } = getCanvasSize();
canvasEl.width  = W;
canvasEl.height = H;

// ══ 壁 ══
const THICK = 80;
let walls = [];
function rebuildWalls() {
  if (walls.length) World.remove(engine.world, walls);
  const wo = { isStatic:true, friction:0.5, restitution:0.05, label:'wall' };
  walls = [
    Bodies.rectangle(W/2,      H+THICK/2,  W+THICK*2, THICK,     wo),
    Bodies.rectangle(-THICK/2, H/2,        THICK,     H+THICK*2, wo),
    Bodies.rectangle(W+THICK/2,H/2,        THICK,     H+THICK*2, wo),
    Bodies.rectangle(W/2,      -THICK/2,   W+THICK*2, THICK,     wo),
  ];
  World.add(engine.world, walls);
}
rebuildWalls();

// マウス/タッチ（Matter.jsのドラッグ用）
const mMouse = Mouse.create(canvasEl);
const mc = MouseConstraint.create(engine, {
  mouse: mMouse,
  constraint:{ stiffness:0.15 }
});
World.add(engine.world, mc);

Runner.run(Runner.create(), engine);

// 食べ物リスト
let physBodies = [];

// 画像キャッシュ（base64→ImageObject）
const imgCache = {};
function getImg(base64) {
  if (!base64) return null;
  if (imgCache[base64]) return imgCache[base64].complete ? imgCache[base64] : null;
  const img = new Image();
  img.src = 'data:image/jpeg;base64,' + base64;
  imgCache[base64] = img;
  return null; // 初回はまだ読み込み中
}

// 円形マスクで描画するヘルパー
function drawCircleItem(context, food, x, y, angle, sz) {
  context.save();
  context.translate(x, y);
  context.rotate(angle);

  if (food.photoBase64) {
    const img = getImg(food.photoBase64);
    if (img) {
      // 写真を円形にくり抜いて描画
      context.beginPath();
      context.arc(0, 0, sz, 0, Math.PI * 2);
      context.clip();
      context.drawImage(img, -sz, -sz, sz * 2, sz * 2);
      // 枠線
      context.beginPath();
      context.arc(0, 0, sz, 0, Math.PI * 2);
      context.strokeStyle = 'rgba(255,255,255,0.6)';
      context.lineWidth = 2;
      context.stroke();
    } else {
      // 画像読み込み中は絵文字で代替
      context.font = `${Math.round(sz * 1.6)}px serif`;
      context.textAlign = 'center';
      context.textBaseline = 'middle';
      context.fillText(food.emoji || '📸', 0, 0);
    }
  } else {
    // 手入力は絵文字
    context.font = `${Math.round(sz * 1.6)}px serif`;
    context.textAlign = 'center';
    context.textBaseline = 'middle';
    context.fillText(food.emoji || '🍽️', 0, 0);
  }

  context.restore();
}

// ══ 自前描画ループ（Matter Renderを使わない） ══
function drawLoop() {
  requestAnimationFrame(drawLoop);
  const cw = canvasEl.width;
  const ch = canvasEl.height;
  ctx.clearRect(0, 0, cw, ch);
  physBodies.forEach(({ body, food }) => {
    if (!body || !food) return;
    const { x, y } = body.position;
    if (x < -200 || x > cw+200 || y < -200 || y > ch+200) return;
    drawCircleItem(ctx, food, x, y, body.angle, body._sz || 42);
  });
}
drawLoop();

// ══ 食べ物を物理世界に追加 ══
function addPhysBody(food) {
  const sz  = 32 + Math.random() * 12;
  const pad = sz + 20;
  const x   = pad + Math.random() * Math.max(10, W - pad * 2);
  const y   = sz + 10;

  // すべて円形の当たり判定（シンプルで確実）
  const body = Bodies.circle(x, y, sz, {
    restitution: 0.2,
    friction:    0.4,
    frictionAir: 0.01,
  });

  body._sz   = sz;
  body._food = food;
  Body.setVelocity(body, { x:(Math.random()-0.5)*2, y:1.5 });
  World.add(engine.world, body);
  physBodies.push({ body, food });
}

// ══ 画面サイズ変更 ══
function resizePhysics() {
  const size = getCanvasSize();
  W = size.W;
  H = size.H;
  canvasEl.width  = W;
  canvasEl.height = H;
  rebuildWalls();
  physBodies.forEach(({ body }) => {
    const { x, y } = body.position;
    Body.setPosition(body, {
      x: Math.max(50, Math.min(W-50, x)),
      y: Math.max(50, Math.min(H-50, y)),
    });
    Body.setVelocity(body, { x:0, y:0 });
  });
}

window.addEventListener('resize', () => setTimeout(resizePhysics, 350));

// ══ 今日の物理リセット ══
function reloadTodayPhysics() {
  physBodies.forEach(({ body }) => World.remove(engine.world, body));
  physBodies = [];
  const items = getDay(todayKey());
  items.forEach(f => addPhysBody(f));
  updateTodayStats();
  document.getElementById('hint-msg').style.display = items.length ? 'none' : '';
}

// ══ 統計更新 ══
function updateTodayStats() {
  const items = getDay(todayKey());
  const total = items.reduce((a,b) => a + (b.calories||0), 0);
  document.getElementById('stat-count').textContent = items.length;
  document.getElementById('stat-cal').textContent   = total;
  document.getElementById('stat-last').textContent  = items.length ? items[items.length-1].emoji : '—';
}

// ══════════════════════════════════════
// タップで食べ物を選択（touchend使用）
// ══════════════════════════════════════
let touchMoved = false;

canvasEl.addEventListener('touchstart', () => { touchMoved = false; }, { passive:true });
canvasEl.addEventListener('touchmove',  () => { touchMoved = true;  }, { passive:true });
canvasEl.addEventListener('touchend', (e) => {
  if (touchMoved) return; // スワイプは無視
  e.preventDefault();
  const touch = e.changedTouches[0];
  const rect  = canvasEl.getBoundingClientRect();
  const mx = touch.clientX - rect.left;
  const my = touch.clientY - rect.top;
  checkBodyTap(mx, my);
}, { passive:false });

// PC用クリックも対応
canvasEl.addEventListener('click', (e) => {
  const rect = canvasEl.getBoundingClientRect();
  checkBodyTap(e.clientX - rect.left, e.clientY - rect.top);
});

function checkBodyTap(mx, my) {
  // 背景タップでメニューを閉じる
  let hit = false;
  for (let i = physBodies.length - 1; i >= 0; i--) {
    const { body, food } = physBodies[i];
    const { x, y } = body.position;
    const sz = (body._sz || 42) * 1.3;
    if (Math.sqrt((mx-x)**2 + (my-y)**2) < sz) {
      showFoodMenu(food);
      hit = true;
      break;
    }
  }
  if (!hit) hideFoodMenu();
}

// ══ 食べ物メニュー ══
let menuFood = null;
let menuAutoHide = null;

function showFoodMenu(food) {
  menuFood = food;
  document.getElementById('fm-emoji').textContent = food.emoji || '🍽️';
  document.getElementById('fm-name').textContent  = food.name  || '';
  const menuEl = document.getElementById('food-menu');
  menuEl.classList.add('show');

  // ボタンのイベントを設定
  document.getElementById('fm-edit').onclick = () => {
    hideFoodMenu();
    openEditModal(todayKey(), food.id);
  };
  document.getElementById('fm-delete').onclick = () => {
    hideFoodMenu();
    deleteItem(todayKey(), food.id);
  };

  clearTimeout(menuAutoHide);
  menuAutoHide = setTimeout(hideFoodMenu, 5000);
}

function hideFoodMenu() {
  document.getElementById('food-menu').classList.remove('show');
  menuFood = null;
  clearTimeout(menuAutoHide);
}

// ══════════════════════════════════════
// DATE VIEW（過去・未来の日付用物理エンジン）
// ══════════════════════════════════════
const dateEngine   = Engine.create({ gravity:{ x:0, y:1.5 } });
const dateCanvasEl = document.getElementById('date-world');
const dateWrapEl   = document.getElementById('date-canvas-wrap');
const dateCtx      = dateCanvasEl.getContext('2d');
let dateW = 0, dateH = 0;
let dateBodies = [];
let currentDateViewKey = null;

// 日付ビュー用壁
let dateWalls = [];
function rebuildDateWalls() {
  if (dateWalls.length) World.remove(dateEngine.world, dateWalls);
  const wo = { isStatic:true, friction:0.5, restitution:0.05 };
  dateWalls = [
    Bodies.rectangle(dateW/2,        dateH+THICK/2,  dateW+THICK*2, THICK,     wo),
    Bodies.rectangle(-THICK/2,       dateH/2,        THICK,         dateH*2,   wo),
    Bodies.rectangle(dateW+THICK/2,  dateH/2,        THICK,         dateH*2,   wo),
    Bodies.rectangle(dateW/2,        -THICK/2,       dateW+THICK*2, THICK,     wo),
  ];
  World.add(dateEngine.world, dateWalls);
}

const dateMouse = Mouse.create(dateCanvasEl);
const dateMC = MouseConstraint.create(dateEngine, { mouse:dateMouse, constraint:{ stiffness:0.15 } });
World.add(dateEngine.world, dateMC);
Runner.run(Runner.create(), dateEngine);

// 日付ビューのタップ
let dateTouchMoved = false;
dateCanvasEl.addEventListener('touchstart', () => { dateTouchMoved = false; }, { passive:true });
dateCanvasEl.addEventListener('touchmove',  () => { dateTouchMoved = true;  }, { passive:true });
dateCanvasEl.addEventListener('touchend', (e) => {
  if (dateTouchMoved) return;
  e.preventDefault();
  const t = e.changedTouches[0];
  const r = dateCanvasEl.getBoundingClientRect();
  checkDateBodyTap(t.clientX - r.left, t.clientY - r.top);
}, { passive:false });
dateCanvasEl.addEventListener('click', (e) => {
  const r = dateCanvasEl.getBoundingClientRect();
  checkDateBodyTap(e.clientX - r.left, e.clientY - r.top);
});

function checkDateBodyTap(mx, my) {
  let hit = false;
  for (let i = dateBodies.length-1; i >= 0; i--) {
    const { body, food } = dateBodies[i];
    const { x, y } = body.position;
    if (Math.sqrt((mx-x)**2+(my-y)**2) < (body._sz||42)*1.3) {
      showDateFoodMenu(food);
      hit = true; break;
    }
  }
  if (!hit) hideFoodMenu();
}

function showDateFoodMenu(food) {
  menuFood = food;
  document.getElementById('fm-emoji').textContent = food.emoji || '🍽️';
  document.getElementById('fm-name').textContent  = food.name  || '';
  document.getElementById('food-menu').classList.add('show');
  document.getElementById('fm-edit').onclick = () => {
    hideFoodMenu();
    openEditModal(currentDateViewKey, food.id);
  };
  document.getElementById('fm-delete').onclick = () => {
    hideFoodMenu();
    deleteDateItem(currentDateViewKey, food.id);
  };
  clearTimeout(menuAutoHide);
  menuAutoHide = setTimeout(hideFoodMenu, 5000);
}

function deleteDateItem(dateStr, itemId) {
  if (!confirm('削除しますか？')) return;
  let items = getDay(dateStr).filter(i => i.id !== itemId);
  saveDay(dateStr, items);
  reloadDatePhysics(dateStr);
  renderCalendar();
  showToast('🗑️ 削除しました');
}

// 日付ビューの描画ループ
function dateDraw() {
  requestAnimationFrame(dateDraw);
  dateCtx.clearRect(0, 0, dateCanvasEl.width, dateCanvasEl.height);
  dateBodies.forEach(({ body, food }) => {
    if (!body || !food) return;
    const { x, y } = body.position;
    if (x < -200 || x > dateW+200 || y < -200 || y > dateH+200) return;
    drawCircleItem(dateCtx, food, x, y, body.angle, body._sz || 42);
  });
}
dateDraw();

function addDatePhysBody(food) {
  const sz  = 32 + Math.random() * 12;
  const pad = sz + 20;
  const x   = pad + Math.random() * Math.max(10, dateW - pad*2);
  const body = Bodies.circle(x, sz+10, sz, { restitution:0.2, friction:0.4, frictionAir:0.01 });
  body._sz = sz; body._food = food;
  Body.setVelocity(body, { x:(Math.random()-0.5)*2, y:1.5 });
  World.add(dateEngine.world, body);
  dateBodies.push({ body, food });
}

function reloadDatePhysics(dateStr) {
  dateBodies.forEach(({ body }) => World.remove(dateEngine.world, body));
  dateBodies = [];
  const items = getDay(dateStr);
  items.forEach(f => addDatePhysBody(f));
  updateDateStats(dateStr);
  document.getElementById('date-hint-msg').style.display = items.length ? 'none' : '';
}

function updateDateStats(dateStr) {
  const items = getDay(dateStr);
  const total = items.reduce((a,b)=>a+(b.calories||0), 0);
  document.getElementById('date-stat-count').textContent = items.length;
  document.getElementById('date-stat-cal').textContent   = total;
}

function resizeDatePhysics() {
  const r = dateWrapEl.getBoundingClientRect();
  dateW = Math.floor(r.width)  || window.innerWidth;
  dateH = Math.floor(r.height) || 400;
  dateCanvasEl.width  = dateW;
  dateCanvasEl.height = dateH;
  rebuildDateWalls();
  dateBodies.forEach(({ body }) => {
    const { x, y } = body.position;
    Body.setPosition(body, { x:Math.max(50,Math.min(dateW-50,x)), y:Math.max(50,Math.min(dateH-50,y)) });
    Body.setVelocity(body, { x:0, y:0 });
  });
}

// ══ カメラUI ══
let cameraStream   = null;
let cameraTarget   = 'today'; // 'today' or 'date'

function triggerFileInput(target) {
  // カメラが使える場合はカメラUI、使えない場合はファイル選択
  cameraTarget = target;
  if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
    openCameraUI();
  } else {
    // フォールバック: ファイル選択
    const inp = document.getElementById('shared-file-input');
    inp.value = '';
    inp.click();
  }
}

function openCameraUI() {
  const ui = document.getElementById('camera-ui');
  ui.style.display = 'flex';

  navigator.mediaDevices.getUserMedia({
    video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
  }).then(stream => {
    cameraStream = stream;
    const video = document.getElementById('camera-video');
    video.srcObject = stream;
    video.play();
    // オーバーレイ描画開始
    requestAnimationFrame(drawCameraOverlay);
  }).catch(() => {
    closeCameraUI();
    // フォールバック
    const inp = document.getElementById('shared-file-input');
    inp.value = ''; inp.click();
  });
}

function drawCameraOverlay() {
  const ui = document.getElementById('camera-ui');
  if (!cameraStream || ui.style.display === 'none') return;

  const canvas  = document.getElementById('camera-overlay');
  const video   = document.getElementById('camera-video');
  const w = video.offsetWidth;
  const h = video.offsetHeight;
  if (w === 0 || h === 0) { requestAnimationFrame(drawCameraOverlay); return; }

  canvas.width  = w;
  canvas.height = h;
  const ctx2 = canvas.getContext('2d');

  const radius = Math.min(w, h) * 0.42;
  const cx = w / 2;
  const cy = h / 2;

  ctx2.clearRect(0, 0, w, h);

  // 暗いオーバーレイ（丸い穴を開ける）
  ctx2.fillStyle = 'rgba(0,0,0,0.55)';
  ctx2.fillRect(0, 0, w, h);
  ctx2.globalCompositeOperation = 'destination-out';
  ctx2.beginPath();
  ctx2.arc(cx, cy, radius, 0, Math.PI * 2);
  ctx2.fill();
  ctx2.globalCompositeOperation = 'source-over';

  // 丸い枠線（白）
  ctx2.beginPath();
  ctx2.arc(cx, cy, radius, 0, Math.PI * 2);
  ctx2.strokeStyle = 'rgba(255,255,255,0.9)';
  ctx2.lineWidth = 3;
  ctx2.stroke();

  requestAnimationFrame(drawCameraOverlay);
}

function closeCameraUI() {
  if (cameraStream) {
    cameraStream.getTracks().forEach(t => t.stop());
    cameraStream = null;
  }
  document.getElementById('camera-ui').style.display = 'none';
}

function takePhoto() {
  const video  = document.getElementById('camera-video');
  const w = video.videoWidth;
  const h = video.videoHeight;
  if (!w || !h) return;

  // 画面上の円の大きさをvideo座標に変換
  const displayW   = video.offsetWidth;
  const displayH   = video.offsetHeight;
  const scaleX = w / displayW;
  const scaleY = h / displayH;
  const radius     = Math.min(displayW, displayH) * 0.42;
  const cx = displayW / 2;
  const cy = displayH / 2;

  // 丸い部分だけを切り抜いてcanvasに描画
  const size = Math.round(radius * 2 * Math.max(scaleX, scaleY));
  const offscreen = document.createElement('canvas');
  offscreen.width  = size;
  offscreen.height = size;
  const oc = offscreen.getContext('2d');

  // 円形クリップ
  oc.beginPath();
  oc.arc(size/2, size/2, size/2, 0, Math.PI * 2);
  oc.clip();

  // videoから円の範囲だけ切り取って描画
  const srcX = Math.round((cx - radius) * scaleX);
  const srcY = Math.round((cy - radius) * scaleY);
  const srcS = Math.round(radius * 2 * Math.max(scaleX, scaleY));
  oc.drawImage(video, srcX, srcY, srcS, srcS, 0, 0, size, size);

  const base64 = offscreen.toDataURL('image/jpeg', 0.85).split(',')[1];

  closeCameraUI();

  // 食べ物データとして追加（AIなし・写真そのまま）
  const food = {
    name:        '📸 写真',
    emoji:       '📸',
    calories:    0,
    color:       '#d4622a',
    shape:       'circle',
    photoBase64: base64,
  };

  if (cameraTarget === 'date') {
    addDateFoodItem(food);
  } else {
    addFoodItem(food);
  }
  showToast('📸 写真を追加しました！');
}

async function handleSharedFile(e) {
  const file = e.target.files[0]; if (!file) return;
  e.target.value = '';
  document.getElementById('loading').classList.add('show');
  try {
    const b64  = await toBase64(file);
    const food = await analyzeFood(b64);
    // 写真を丸くコロコロさせるためbase64を保存
    food.photoBase64 = b64;
    if (fileInputTarget === 'date') {
      addDateFoodItem(food);
    } else {
      addFoodItem(food);
    }
    showToast(`🍴 ${food.name} を追加しました！`);
  } catch(err) {
    console.error(err);
    showToast('❌ 認識できませんでした。手入力をお試しください。');
  } finally {
    document.getElementById('loading').classList.remove('show');
  }
}

function addDateFoodItem(food) {
  if (!currentDateViewKey) return;
  const items = getDay(currentDateViewKey);
  const item  = { id:Date.now(), shape:'circle', ...food };
  items.push(item);
  saveDay(currentDateViewKey, items);
  addDatePhysBody(item);
  document.getElementById('date-hint-msg').style.display = 'none';
  updateDateStats(currentDateViewKey);
  renderCalendar();
  maybeShowAd();
}

// 日付ビューを開く
function openDateView(ds) {
  currentDateViewKey = ds;
  const [y,m,d] = ds.split('-');
  document.getElementById('date-view-label').textContent = `${parseInt(y)}年${parseInt(m)}月${parseInt(d)}日`;
  showView('date');
  setTimeout(() => {
    resizeDatePhysics();
    reloadDatePhysics(ds);
  }, 80);
}
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  if (name === 'today') {
    document.querySelectorAll('.nav-tab')[0].classList.add('active');
    setTimeout(() => { resizePhysics(); updateTodayStats(); }, 50);
  } else if (name === 'calendar') {
    document.querySelectorAll('.nav-tab')[1].classList.add('active');

}

function toBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload  = () => res(r.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

async function analyzeFood(b64) {
  const prompt = `この料理の写真を見て、以下のJSON形式のみで答えてください。前後に余分な文字は一切不要です。
{"name":"料理名(日本語,短く)","emoji":"絵文字1文字","calories":推定kcal整数,"color":"#rrggbb","shape":"circle"}
shapeはすべてcircleでOKです。`;

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 200,
      messages: [{ role:'user', content:[
        { type:'image', source:{ type:'base64', media_type:'image/jpeg', data:b64 } },
        { type:'text', text:prompt }
      ]}]
    })
  });
  const data = await res.json();
  const txt  = data.content.map(i => i.text||'').join('');
  const json = txt.match(/\{[\s\S]*\}/);
  if (!json) throw new Error('JSON not found');
  return JSON.parse(json[0]);
}

function addFoodItem(food) {

  updateTodayStats();
  maybeShowAd();
}

const EMOJIS = ['🍙','🍱','🍜','🍣','🍛','🍔','🍕','🥗','🍰','🥩','🍳','🥞','🍞','🥪','🌮','🥘','🍲','🍝','🧆','🍦','☕','🥤','🍺','🍷'];
let pickerEmoji = { manual:'🍙', edit:'🍙', past:'🍙' };
let manualTargetDate = null; // null = 今日, 文字列 = 指定日

function buildPicker(containerId, key, initial) {
  pickerEmoji[key] = initial || '🍙';
  const c = document.getElementById(containerId);
  c.innerHTML = '';
  EMOJIS.forEach(em => {
    const b = document.createElement('button');
    b.className = 'emoji-opt' + (em === pickerEmoji[key] ? ' selected' : '');
    b.textContent = em;
    b.type = 'button';
    b.onclick = () => {
      pickerEmoji[key] = em;
      c.querySelectorAll('.emoji-opt').forEach(x => x.classList.remove('selected'));
      b.classList.add('selected');
    };
    c.appendChild(b);
  });
}

function openManualModal(targetDate) {
  manualTargetDate = targetDate || null;
  document.getElementById('m-name').value  = '';
  document.getElementById('m-cal').value   = '';
  document.getElementById('m-color').value = '#d4622a';
  buildPicker('manual-emoji-picker', 'manual', '🍙');

  const [y,mo,d] = dateStr.split('-');
  document.querySelector('#manual-modal h3').textContent =
    `✏️ ${parseInt(y)}年${parseInt(mo)}月${parseInt(d)}日に追加`;

}
function closeManualModal() {
  document.getElementById('manual-modal').classList.remove('open');

}

function submitManual() {
  const name = document.getElementById('m-name').value.trim();
  if (!name) { showToast('料理名を入力してください'); return; }
  const cal   = parseInt(document.getElementById('m-cal').value) || 0;
  const color = document.getElementById('m-color').value;
  const food  = { name, emoji:pickerEmoji.manual, calories:cal, color, shape:'circle' };

  const targetDate = manualTargetDate || todayKey();
  const items = getDay(targetDate);
  const item  = { id: Date.now(), ...food };
  items.push(item);
  saveDay(targetDate, items);

  // 今日なら物理に追加
  if (targetDate === todayKey()) {
    addPhysBody(item);
    document.getElementById('hint-msg').style.display = 'none';
    updateTodayStats();
  } else if (targetDate === currentDateViewKey) {
    addDatePhysBody(item);
    document.getElementById('date-hint-msg').style.display = 'none';
    updateDateStats(targetDate);
  }

  renderCalendar();

let editCtx = null; // { dateStr, itemId }

function openEditModal(dateStr, itemId) {
  const item = getDay(dateStr).find(i => i.id === itemId);
  if (!item) { showToast('データが見つかりません'); return; }
  editCtx = { dateStr, itemId };
  document.getElementById('e-name').value  = item.name || '';
  document.getElementById('e-cal').value   = item.calories || '';
  document.getElementById('e-color').value = item.color || '#d4622a';
  buildPicker('edit-emoji-picker', 'edit', item.emoji || '🍙');
  document.getElementById('edit-modal').classList.add('open');
}
function closeEditModal() {
  document.getElementById('edit-modal').classList.remove('open');
  editCtx = null;
}

function submitEdit() {
  if (!editCtx) return;
  const { dateStr, itemId } = editCtx;
  const items = getDay(dateStr);
  const idx   = items.findIndex(i => i.id === itemId);
  if (idx === -1) return;

  items[idx] = {
    ...items[idx],
    name:     document.getElementById('e-name').value.trim() || items[idx].name,
    calories: parseInt(document.getElementById('e-cal').value) || items[idx].calories,
    emoji:    pickerEmoji.edit,
    color:    document.getElementById('e-color').value,
  };
  saveDay(dateStr, items);

  if (dateStr === todayKey()) reloadTodayPhysics();
  else if (dateStr === currentDateViewKey) reloadDatePhysics(dateStr);
  if (document.getElementById('day-detail').classList.contains('open')) renderDayDetail(dateStr);
  renderCalendar();
  closeEditModal();
  showToast('✏️ 編集しました');
}

function deleteItem(dateStr, itemId) {
  if (!confirm('削除しますか？')) return;
  let items = getDay(dateStr).filter(i => i.id !== itemId);
  saveDay(dateStr, items);
  if (dateStr === todayKey()) reloadTodayPhysics();
  if (document.getElementById('day-detail').classList.contains('open')) {
    items.length ? renderDayDetail(dateStr) : closeDayDetail();
  }
  renderCalendar();
  showToast('🗑️ 削除しました');
}

let calDate = new Date();

function changeMonth(d) {
  calDate = new Date(calDate.getFullYear(), calDate.getMonth()+d, 1);
  renderCalendar();
}

function renderCalendar() {
  const year  = calDate.getFullYear();
  const month = calDate.getMonth();
  document.getElementById('cal-month-label').textContent = `${year}年 ${month+1}月`;

  const firstDay = new Date(year, month, 1).getDay();
  const lastDate  = new Date(year, month+1, 0).getDate();
  const store     = getStore();
  const grid      = document.getElementById('cal-grid');
  grid.innerHTML  = '';

  for (let i=0; i<firstDay; i++) {
    const c = document.createElement('div');
    c.className = 'cal-cell empty';
    grid.appendChild(c);
  }
  for (let d=1; d<=lastDate; d++) {
    const ds    = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const items = store[ds] || [];
    const cell  = document.createElement('div');
    cell.className = 'cal-cell' + (ds===todayKey()?' today':'') + (items.length?' has-data':'');

    const num = document.createElement('div');
    num.className = 'cal-day-num';
    num.textContent = d;
    cell.appendChild(num);

    if (items.length) {
      const em = document.createElement('div');
      em.className = 'cal-emojis';
      em.textContent = items.slice(0,4).map(i=>i.emoji).join('');
      cell.appendChild(em);

      const kc = document.createElement('div');
      kc.className = 'cal-kcal';
      kc.textContent = items.reduce((a,b)=>a+(b.calories||0),0) + 'kcal';
      cell.appendChild(kc);
    }

    // 全日付タップで開く（今日はtodayビュー、それ以外はdateビュー）
    if (ds === todayKey()) {
      cell.onclick = () => showView('today');
    } else {
      cell.onclick = () => openDateView(ds);
    }
    grid.appendChild(cell);
  }
}

// ══════════════════════════════════════
// GYROSCOPE
// ══════════════════════════════════════
let gyroEnabled  = false;

function syncGyroBtn() {
  ['gyro-btn','gyro-btn2'].forEach(id => {
    const btn = document.getElementById(id);
    if (!btn) return;
    btn.classList.toggle('gyro-on', gyroEnabled);
    btn.textContent = gyroEnabled ? '🌀' : '📱';
  });
}

function requestGyro() {
  // DeviceMotionEventを使う（加速度センサーで直接重力ベクトルを取得）
  if (typeof DeviceMotionEvent !== 'undefined' &&
      typeof DeviceMotionEvent.requestPermission === 'function') {
    // iOS 13+ は許可が必要
    DeviceMotionEvent.requestPermission()
      .then(s => s === 'granted' ? enableGyro() : showToast('❌ センサーの許可が必要です'))
      .catch(() => showToast('❌ センサーが使えません'));
  } else if ('DeviceMotionEvent' in window) {
    enableGyro();
  } else {
    showToast('❌ このデバイスはセンサー非対応です');
  }
}

function enableGyro() {
  if (gyroEnabled) {
    gyroEnabled = false;
    window.removeEventListener('devicemotion', handleMotion);
    engine.gravity.x = 0;     engine.gravity.y = 1.5;
    dateEngine.gravity.x = 0; dateEngine.gravity.y = 1.5;
    syncGyroBtn();
    showToast('📱 ジャイロ OFF');
    return;
  }
  gyroEnabled = true;
  window.addEventListener('devicemotion', handleMotion);
  syncGyroBtn();
  showToast('🌀 ジャイロ ON！傾けてみて！');
}

// 平滑化用
let smoothGX = 0;
let smoothGY = 1.5;

function handleMotion(e) {
  if (!gyroEnabled) return;
  const ag = e.accelerationIncludingGravity;
  if (!ag) return;

  // iPhoneを縦に持った時のaccelerationIncludingGravity実測値:
  //   x ≈  0    (左右中立)
  //   y ≈ -9.8  (縦持ちで重力がy負方向にかかる)
  //   z ≈  0
  //
  // 欲しい動作:
  //   右に傾ける  → gx正（右に転がる）  → ag.xが負になる → rawGX = -ag.x/9.8
  //   左に傾ける  → gx負（左に転がる）  → ag.xが正になる → rawGX = -ag.x/9.8
  //   下部を下に  → gy正（下に転がる）  → ag.yが負のまま変化 → rawGY = -ag.y/9.8
  //   上部を下に  → gy負（上に転がる）  → ag.yが正に近づく  → rawGY = -ag.y/9.8
  //   机に水平    → gy≈0（ほぼ止まる）  → ag.y≈0           → rawGY ≈ 0

  const rawGX =  (ag.x ?? 0) / 9.8 * 2.5; // 左右を正しい向きに
  const rawGY = -(ag.y ?? 0) / 9.8 * 2.5; // 縦持ちでy=-9.8 → rawGY=+2.5（正常な下向き重力）

  const S = 0.25;
  smoothGX = smoothGX + S * (rawGX - smoothGX);
  smoothGY = smoothGY + S * (rawGY - smoothGY);

  const gx = Math.max(-3, Math.min(3, smoothGX));
  const gy = Math.max(-3, Math.min(3, smoothGY));

  engine.gravity.x     = gx; engine.gravity.y     = gy;
  dateEngine.gravity.x = gx; dateEngine.gravity.y = gy;
}

// ══════════════════════════════════════
function initPWA() {
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
  const c = document.createElement('canvas');
  c.width = c.height = 180;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#f5f0e8';
  ctx.beginPath(); ctx.roundRect(0,0,180,180,36); ctx.fill();
  ctx.font = '110px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('🍙', 90, 95);
  const icon = document.getElementById('apple-icon');
  if (icon) icon.href = c.toDataURL('image/png');
}

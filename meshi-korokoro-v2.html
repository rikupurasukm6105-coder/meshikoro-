<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>めしコロ 🍙</title>

<!-- PWA -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="めしコロ">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f5f0e8">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" id="apple-icon" href="">

<!-- 横画面ロック -->
<style>
@media screen and (orientation: landscape) {
  #rotate-msg { display:flex !important; }
  #app-root    { display:none !important; }
}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Kaisei+Tokumin:wght@400;700;800&family=DotGothic16&display=swap');

:root {
  --bg:     #f5f0e8;
  --panel:  #efe9dc;
  --card:   #ffffff;
  --accent: #d4622a;
  --accent2:#b8860b;
  --green:  #2a7a5e;
  --text:   #2c2118;
  --muted:  #8a7560;
  --border: rgba(180,120,60,0.18);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; overflow:hidden; background:var(--bg); }

/* 横向きメッセージ */
#rotate-msg {
  display:none;
  position:fixed; inset:0; z-index:9999;
  background:var(--bg);
  align-items:center; justify-content:center;
  flex-direction:column; gap:12px;
  font-family:'Kaisei Tokumin',serif; color:var(--text); font-size:18px;
}

#app-root {
  display:flex; flex-direction:column; height:100%;
}

/* ── HEADER ── */
header {
  height:54px; flex-shrink:0;
  background:var(--panel);
  border-bottom:1px solid var(--border);
  display:flex; align-items:center;
  padding:0 16px; gap:12px; z-index:50;
}
.logo { font-family:'DotGothic16',monospace; font-size:20px; color:var(--accent); letter-spacing:2px; }
.logo em { color:var(--accent2); font-style:normal; }
.nav-tabs { display:flex; gap:4px; margin-left:auto; }
.nav-tab {
  background:none; border:1px solid transparent; border-radius:8px;
  color:var(--muted); font-family:'DotGothic16',monospace; font-size:12px;
  padding:5px 12px; cursor:pointer; transition:all 0.2s;
}
.nav-tab.active { border-color:var(--accent); color:var(--accent); background:rgba(212,98,42,0.08); }

/* ── VIEWS ── */
#app { flex:1; overflow:hidden; position:relative; min-height:0; }
.view { display:none; height:100%; flex-direction:column; }
.view.active { display:flex; }

/* ── TODAY ── */
#today-stats {
  flex-shrink:0; background:var(--panel);
  border-bottom:1px solid var(--border);
  padding:8px 16px; display:flex; gap:20px; align-items:center;
}
.t-stat { text-align:center; }
.t-stat-num { font-size:20px; font-weight:800; color:var(--accent2); line-height:1; }
.t-stat-lbl { font-size:10px; color:var(--muted); margin-top:2px; font-family:'DotGothic16',monospace; }

#canvas-wrap { flex:1; position:relative; overflow:hidden; min-height:0; }
canvas { display:block; position:absolute; top:0; left:0; }

#hint-msg {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-60%);
  text-align:center; color:rgba(44,33,24,0.2); pointer-events:none;
}
#hint-msg .big { font-size:56px; margin-bottom:8px; }
#hint-msg p { font-size:13px; line-height:1.7; }

/* ── ACTION BAR ── */
#action-bar {
  flex-shrink:0; background:var(--panel);
  border-top:1px solid var(--border);
  padding:10px 16px; display:flex; gap:8px; align-items:center;
}
#file-input { display:none; }

.btn {
  border:none; border-radius:10px; padding:10px 16px;
  font-family:'DotGothic16',monospace; font-size:12px;
  cursor:pointer; transition:all 0.18s;
  display:flex; align-items:center; gap:6px; white-space:nowrap;
}
.btn:active { transform:scale(0.95); }
.btn-primary {
  background:var(--accent); color:#fff; flex:1; justify-content:center;
  font-size:13px; box-shadow:0 3px 16px rgba(212,98,42,0.3);
}
.btn-secondary {
  background:var(--card); color:var(--text); border:1px solid var(--border);
}
.btn-secondary:hover { border-color:var(--accent2); }

/* ジャイロボタン */
#gyro-btn.gyro-on {
  border-color:var(--green); color:var(--green);
  background:rgba(42,122,94,0.1);
  animation:gyroPulse 1.8s ease-in-out infinite;
}
@keyframes gyroPulse {
  0%,100% { box-shadow:0 0 0 0 rgba(42,122,94,0.3); }
  50%      { box-shadow:0 0 0 6px rgba(42,122,94,0); }
}

/* ── CALENDAR ── */
#view-calendar { overflow:hidden; }
#cal-header {
  flex-shrink:0; display:flex; align-items:center;
  justify-content:space-between; padding:14px 20px;
  background:var(--panel); border-bottom:1px solid var(--border);
}
#cal-month-label { font-family:'DotGothic16',monospace; font-size:16px; color:var(--accent2); }
.cal-nav-btn {
  background:var(--card); border:1px solid var(--border); border-radius:8px;
  color:var(--text); width:32px; height:32px; cursor:pointer; font-size:16px;
  display:flex; align-items:center; justify-content:center; transition:all 0.15s;
}
.cal-nav-btn:hover { border-color:var(--accent); color:var(--accent); }
#cal-grid-wrap { flex:1; overflow-y:auto; padding:12px; }
.cal-dow-row { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; margin-bottom:4px; }
.cal-dow { text-align:center; font-family:'DotGothic16',monospace; font-size:10px; color:var(--muted); padding:4px 0; }
.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
.cal-cell {
  aspect-ratio:1; background:var(--card); border-radius:8px;
  border:1px solid transparent; padding:4px; cursor:pointer;
  transition:all 0.15s; overflow:hidden; display:flex;
  flex-direction:column; min-height:52px;
}
.cal-cell:hover { border-color:var(--accent); }
.cal-cell.today { border-color:var(--accent2); }
.cal-cell.selected { background:rgba(212,98,42,0.1); border-color:var(--accent); }
.cal-cell.empty { background:transparent; cursor:default; border-color:transparent; }
.cal-day-num { font-size:11px; color:var(--muted); font-family:'DotGothic16',monospace; line-height:1; }
.cal-cell.today .cal-day-num { color:var(--accent2); font-weight:700; }
.cal-emojis { font-size:13px; line-height:1.3; flex:1; overflow:hidden; word-break:break-all; }
.cal-kcal { font-size:9px; color:var(--green); font-family:'DotGothic16',monospace; margin-top:auto; }

/* ── DAY DETAIL ── */
#day-detail { position:fixed; inset:0; z-index:200; display:none; align-items:flex-end; }
#day-detail.open { display:flex; }
#day-detail-backdrop { position:absolute; inset:0; background:rgba(30,15,5,0.45); }
#day-detail-sheet {
  position:relative; z-index:1; width:100%; max-height:70vh;
  background:var(--panel); border-top:2px solid var(--accent);
  border-radius:16px 16px 0 0; padding:16px; overflow-y:auto;
  animation:slideUp 0.25s ease;
}
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
#day-detail-title { font-family:'DotGothic16',monospace; color:var(--accent2); font-size:14px; margin-bottom:12px; }
#day-detail-summary { display:flex; gap:16px; margin-bottom:14px; }
.ds-stat { text-align:center; flex:1; background:var(--card); border-radius:8px; padding:8px; }
.ds-num { font-size:20px; font-weight:800; color:var(--accent); }
.ds-lbl { font-size:10px; color:var(--muted); font-family:'DotGothic16',monospace; }
#day-detail-list { display:flex; flex-direction:column; gap:8px; }
.detail-item {
  display:flex; align-items:center; gap:10px; background:var(--card);
  border-radius:10px; padding:10px 12px; border:1px solid transparent;
}
.detail-emoji { font-size:26px; flex-shrink:0; }
.detail-info { flex:1; }
.detail-name { font-size:14px; font-weight:700; }
.detail-cal { font-size:11px; color:var(--green); font-family:'DotGothic16',monospace; }
.detail-actions { display:flex; gap:6px; }
.icon-btn {
  background:none; border:1px solid var(--border); border-radius:6px;
  color:var(--muted); width:32px; height:32px; cursor:pointer; font-size:14px;
  display:flex; align-items:center; justify-content:center; transition:all 0.15s;
}
.icon-btn:hover { border-color:var(--accent); color:var(--accent); }
.icon-btn.del:hover { border-color:#b42820; color:#b42820; }

/* ── FOOD MENU (タップメニュー) ── */
#food-menu {
  position:fixed; bottom:80px; left:50%; transform:translateX(-50%);
  background:var(--card); border:1px solid var(--border); border-radius:16px;
  padding:12px 16px; z-index:600; display:none;
  gap:10px; box-shadow:0 4px 24px rgba(0,0,0,0.15); align-items:center;
  animation:fadeInUp 0.2s ease;
}
#food-menu.show { display:flex; }
@keyframes fadeInUp { from{opacity:0;transform:translateX(-50%) translateY(8px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
.food-menu-name { font-size:13px; font-weight:700; color:var(--text); max-width:90px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.food-menu-btn {
  background:var(--panel); border:1px solid var(--border); border-radius:8px;
  padding:7px 14px; font-size:13px; cursor:pointer; color:var(--text);
  font-family:'DotGothic16',monospace;
}
.food-menu-btn.del { background:#fff0f0; border-color:#ffcccc; color:#b42820; }
.food-menu-close {
  background:none; border:none; font-size:20px; cursor:pointer;
  color:var(--muted); padding:0 2px; line-height:1;
}

/* ── MODALS ── */
.modal-overlay {
  position:fixed; inset:0; z-index:300; background:rgba(30,15,5,0.5);
  display:none; align-items:center; justify-content:center; padding:20px;
}
.modal-overlay.open { display:flex; }
.modal {
  background:var(--panel); border:1px solid var(--border); border-radius:16px;
  padding:20px; width:100%; max-width:360px; animation:fadeInScale 0.2s ease;
}
@keyframes fadeInScale { from{opacity:0;transform:scale(0.93)} to{opacity:1;transform:scale(1)} }
.modal h3 { font-family:'DotGothic16',monospace; color:var(--accent2); font-size:14px; margin-bottom:14px; }
.form-group { margin-bottom:12px; }
.form-group label { display:block; font-size:11px; color:var(--muted); font-family:'DotGothic16',monospace; margin-bottom:5px; }
.form-group input {
  width:100%; background:var(--card); border:1px solid var(--border);
  border-radius:8px; color:var(--text); padding:9px 12px;
  font-family:'Kaisei Tokumin',serif; font-size:14px; outline:none; transition:border-color 0.15s;
}
.form-group input:focus { border-color:var(--accent); }
.emoji-picker { display:flex; flex-wrap:wrap; gap:6px; margin-top:6px; }
.emoji-opt {
  background:var(--card); border:1px solid var(--border); border-radius:6px;
  width:36px; height:36px; font-size:20px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; transition:all 0.12s;
}
.emoji-opt.selected { border-color:var(--accent); background:rgba(212,98,42,0.1); }
.modal-actions { display:flex; gap:8px; margin-top:16px; }
.modal-actions .btn { flex:1; justify-content:center; }
.btn-cancel { background:var(--card); color:var(--muted); border:1px solid var(--border); }

/* ── LOADING / TOAST ── */
#loading {
  position:fixed; inset:0; z-index:400; background:rgba(245,240,232,0.88);
  display:none; flex-direction:column; align-items:center; justify-content:center; gap:14px;
}
#loading.show { display:flex; }
.spin { width:44px; height:44px; border:3px solid rgba(212,98,42,0.2); border-top-color:var(--accent); border-radius:50%; animation:spin 0.75s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
.load-txt { font-family:'DotGothic16',monospace; font-size:13px; color:var(--accent); letter-spacing:2px; }

#toast {
  position:fixed; bottom:90px; left:50%;
  transform:translateX(-50%) translateY(10px);
  background:var(--card); border:1px solid var(--accent); border-radius:12px;
  padding:9px 18px; font-size:13px; opacity:0; transition:all 0.28s;
  z-index:500; pointer-events:none; white-space:nowrap;
}
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
</style>
</head>
<body>

<!-- 横向きメッセージ -->
<div id="rotate-msg">
  <div style="font-size:48px">📱</div>
  <div>縦向きにしてください</div>
</div>

<div id="app-root">
  <header>
    <div class="logo">めし<em>コロ</em> 🍙</div>
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="showView('today')">今日</button>
      <button class="nav-tab" onclick="showView('calendar')">カレンダー</button>
    </div>
  </header>

  <div id="app">

    <!-- TODAY VIEW -->
    <div id="view-today" class="view active">
      <div id="today-stats">
        <div class="t-stat">
          <div class="t-stat-num" id="stat-count">0</div>
          <div class="t-stat-lbl">食事数</div>
        </div>
        <div class="t-stat">
          <div class="t-stat-num" id="stat-cal">0</div>
          <div class="t-stat-lbl">kcal</div>
        </div>
        <div class="t-stat">
          <div class="t-stat-num" id="stat-last" style="font-size:14px">—</div>
          <div class="t-stat-lbl">最新</div>
        </div>
      </div>

      <div id="canvas-wrap">
        <div id="hint-msg">
          <div class="big">🍽️</div>
          <p>📸 撮影 または ✏️ 入力で<br>今日の食事を記録しよう</p>
        </div>
        <canvas id="world"></canvas>
      </div>

      <div id="action-bar">
        <input type="file" id="file-input" accept="image/*" capture="environment" onchange="handleFile(event)">
        <button class="btn btn-primary" onclick="document.getElementById('file-input').click()">
          📸 撮影して追加
        </button>
        <button class="btn btn-secondary" onclick="openManualModal()">✏️ 手入力</button>
        <button class="btn btn-secondary" id="gyro-btn" onclick="requestGyro()">📱</button>
      </div>
    </div>

    <!-- DATE VIEW（過去・未来の日付用） -->
    <div id="view-date" class="view">
      <div id="date-stats" style="flex-shrink:0;background:var(--panel);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;gap:12px;align-items:center;">
        <button class="btn btn-secondary" style="padding:6px 10px;font-size:18px;" onclick="showView('calendar')">‹</button>
        <div style="flex:1;text-align:center;">
          <div id="date-view-label" style="font-family:'DotGothic16',monospace;font-size:13px;color:var(--accent2);"></div>
        </div>
        <div class="t-stat">
          <div class="t-stat-num" id="date-stat-count">0</div>
          <div class="t-stat-lbl">食事数</div>
        </div>
        <div class="t-stat">
          <div class="t-stat-num" id="date-stat-cal">0</div>
          <div class="t-stat-lbl">kcal</div>
        </div>
      </div>

      <div id="date-canvas-wrap" style="flex:1;position:relative;overflow:hidden;min-height:0;">
        <div id="date-hint-msg" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-60%);text-align:center;color:rgba(44,33,24,0.2);pointer-events:none;">
          <div style="font-size:56px;margin-bottom:8px;">🍽️</div>
          <p style="font-size:13px;line-height:1.7;">📸 撮影 または ✏️ 入力で<br>この日の食事を記録しよう</p>
        </div>
        <canvas id="date-world"></canvas>
      </div>

      <div id="date-action-bar" style="flex-shrink:0;background:var(--panel);border-top:1px solid var(--border);padding:10px 16px;display:flex;gap:8px;align-items:center;">
        <input type="file" id="date-file-input" accept="image/*" capture="environment" onchange="handleDateFile(event)">
        <button class="btn btn-primary" onclick="document.getElementById('date-file-input').click()">
          📸 撮影して追加
        </button>
        <button class="btn btn-secondary" onclick="openManualModal(currentDateViewKey)">✏️ 手入力</button>
      </div>
    </div>

    <!-- CALENDAR VIEW -->
    <div id="view-calendar" class="view">
      <div id="cal-header">
        <button class="cal-nav-btn" onclick="changeMonth(-1)">‹</button>
        <div id="cal-month-label"></div>
        <button class="cal-nav-btn" onclick="changeMonth(1)">›</button>
      </div>
      <div id="cal-grid-wrap">
        <div class="cal-dow-row">
          <div class="cal-dow">日</div><div class="cal-dow">月</div>
          <div class="cal-dow">火</div><div class="cal-dow">水</div>
          <div class="cal-dow">木</div><div class="cal-dow">金</div>
          <div class="cal-dow">土</div>
        </div>
        <div class="cal-grid" id="cal-grid"></div>
      </div>
    </div>

  </div><!-- #app -->
</div><!-- #app-root -->

<!-- ジャイロデバッグ表示（確認後に削除） -->
<div id="gyro-debug" style="
  display:none; position:fixed; top:60px; left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,0.75); color:#fff;
  font-family:monospace; font-size:13px;
  padding:8px 14px; border-radius:8px; z-index:999;
  pointer-events:none; white-space:nowrap;
"></div>

<!-- FOOD MENU (タップ時) -->
<div id="food-menu">
  <span id="fm-emoji" style="font-size:24px"></span>
  <span class="food-menu-name" id="fm-name"></span>
  <button class="food-menu-btn" id="fm-edit">✏️ 編集</button>
  <button class="food-menu-btn del" id="fm-delete">🗑️ 削除</button>
  <button class="food-menu-close" onclick="hideFoodMenu()">×</button>
</div>

<!-- DAY DETAIL -->
<div id="day-detail">
  <div id="day-detail-backdrop" onclick="closeDayDetail()"></div>
  <div id="day-detail-sheet">
    <div id="day-detail-title"></div>
    <div id="day-detail-summary"></div>
    <div id="day-detail-list"></div>
    <button class="btn btn-primary" id="day-add-btn" style="margin-top:12px;width:100%;justify-content:center" onclick="openPastAddModal()">
      ＋ この日に食事を追加
    </button>
    <button class="btn btn-cancel" style="margin-top:8px;width:100%;justify-content:center" onclick="closeDayDetail()">閉じる</button>
  </div>
</div>

<!-- MANUAL MODAL -->
<div class="modal-overlay" id="manual-modal">
  <div class="modal">
    <h3>✏️ 食事を手入力</h3>
    <div class="form-group">
      <label>料理名</label>
      <input type="text" id="m-name" placeholder="例：カレーライス" maxlength="30">
    </div>
    <div class="form-group">
      <label>カロリー (kcal)</label>
      <input type="number" id="m-cal" placeholder="例：500" min="0" max="5000">
    </div>
    <div class="form-group">
      <label>絵文字</label>
      <div class="emoji-picker" id="manual-emoji-picker"></div>
    </div>
    <div class="form-group">
      <label>色</label>
      <input type="color" id="m-color" value="#d4622a" style="height:36px;padding:2px 6px;cursor:pointer">
    </div>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeManualModal()">キャンセル</button>
      <button class="btn btn-primary" onclick="submitManual()">追加 🍽️</button>
    </div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <h3>✏️ 食事を編集</h3>
    <div class="form-group">
      <label>料理名</label>
      <input type="text" id="e-name" maxlength="30">
    </div>
    <div class="form-group">
      <label>カロリー (kcal)</label>
      <input type="number" id="e-cal" min="0" max="5000">
    </div>
    <div class="form-group">
      <label>絵文字</label>
      <div class="emoji-picker" id="edit-emoji-picker"></div>
    </div>
    <div class="form-group">
      <label>色</label>
      <input type="color" id="e-color" style="height:36px;padding:2px 6px;cursor:pointer">
    </div>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeEditModal()">キャンセル</button>
      <button class="btn btn-primary" onclick="submitEdit()">保存</button>
    </div>
  </div>
</div>

<div id="loading"><div class="spin"></div><div class="load-txt">AI解析中...</div></div>
<div id="toast"></div>

<script>
'use strict';

// ══════════════════════════════════════
// DATA STORE
// ══════════════════════════════════════
const todayKey = () => new Date().toISOString().slice(0,10);
const getStore = () => { try { return JSON.parse(localStorage.getItem('meshikoroV3')||'{}'); } catch{ return {}; } };
const saveStore = s => localStorage.setItem('meshikoroV3', JSON.stringify(s));
const getDay  = d => { const s=getStore(); return s[d]||[]; };
const saveDay = (d,items) => { const s=getStore(); s[d]=items; saveStore(s); };

// ══════════════════════════════════════
// PHYSICS ENGINE
// ══════════════════════════════════════
const { Engine, Runner, Bodies, Body, World, Events, Mouse, MouseConstraint } = Matter;

const engine  = Engine.create({ gravity:{ x:0, y:1.5 } });
const canvasEl = document.getElementById('world');
const wrapEl   = document.getElementById('canvas-wrap');
const ctx      = canvasEl.getContext('2d');

function getCanvasSize() {
  const r = wrapEl.getBoundingClientRect();
  return {
    W: Math.floor(r.width)  || window.innerWidth,
    H: Math.floor(r.height) || 400
  };
}

let { W, H } = getCanvasSize();
canvasEl.width  = W;
canvasEl.height = H;

// ══ 壁 ══
const THICK = 80;
let walls = [];
function rebuildWalls() {
  if (walls.length) World.remove(engine.world, walls);
  const wo = { isStatic:true, friction:0.5, restitution:0.05, label:'wall' };
  walls = [
    Bodies.rectangle(W/2,      H+THICK/2,  W+THICK*2, THICK,     wo),
    Bodies.rectangle(-THICK/2, H/2,        THICK,     H+THICK*2, wo),
    Bodies.rectangle(W+THICK/2,H/2,        THICK,     H+THICK*2, wo),
    Bodies.rectangle(W/2,      -THICK/2,   W+THICK*2, THICK,     wo),
  ];
  World.add(engine.world, walls);
}
rebuildWalls();

// マウス/タッチ（Matter.jsのドラッグ用）
const mMouse = Mouse.create(canvasEl);
const mc = MouseConstraint.create(engine, {
  mouse: mMouse,
  constraint:{ stiffness:0.15 }
});
World.add(engine.world, mc);

Runner.run(Runner.create(), engine);

// 食べ物リスト
let physBodies = [];

// ══ 自前描画ループ（Matter Renderを使わない） ══
function drawLoop() {
  requestAnimationFrame(drawLoop);

  // canvasサイズが変わっていたら自動追従
  const cw = canvasEl.width;
  const ch = canvasEl.height;

  ctx.clearRect(0, 0, cw, ch);

  physBodies.forEach(({ body, food }) => {
    if (!body || !food) return;
    const { x, y } = body.position;
    if (x < -200 || x > cw+200 || y < -200 || y > ch+200) return;
    const sz = body._sz || 42;
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(body.angle);
    ctx.font = `${Math.round(sz * 1.6)}px serif`;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(food.emoji || '🍽️', 0, 0);
    ctx.restore();
  });
}
drawLoop();

// ══ 食べ物を物理世界に追加 ══
function addPhysBody(food) {
  const sz  = 32 + Math.random() * 12;
  const pad = sz + 20;
  const x   = pad + Math.random() * Math.max(10, W - pad * 2);
  const y   = sz + 10;

  // すべて円形の当たり判定（シンプルで確実）
  const body = Bodies.circle(x, y, sz, {
    restitution: 0.2,
    friction:    0.4,
    frictionAir: 0.01,
  });

  body._sz   = sz;
  body._food = food;
  Body.setVelocity(body, { x:(Math.random()-0.5)*2, y:1.5 });
  World.add(engine.world, body);
  physBodies.push({ body, food });
}

// ══ 画面サイズ変更 ══
function resizePhysics() {
  const size = getCanvasSize();
  W = size.W;
  H = size.H;
  canvasEl.width  = W;
  canvasEl.height = H;
  rebuildWalls();
  physBodies.forEach(({ body }) => {
    const { x, y } = body.position;
    Body.setPosition(body, {
      x: Math.max(50, Math.min(W-50, x)),
      y: Math.max(50, Math.min(H-50, y)),
    });
    Body.setVelocity(body, { x:0, y:0 });
  });
}

window.addEventListener('resize', () => setTimeout(resizePhysics, 350));

// タップで食べ物を選択（touchend使用）
// ══════════════════════════════════════
let touchMoved = false;

canvasEl.addEventListener('touchstart', () => { touchMoved = false; }, { passive:true });
canvasEl.addEventListener('touchmove',  () => { touchMoved = true;  }, { passive:true });
canvasEl.addEventListener('touchend', (e) => {
  if (touchMoved) return; // スワイプは無視
  e.preventDefault();
  const touch = e.changedTouches[0];
  const rect  = canvasEl.getBoundingClientRect();
  const mx = touch.clientX - rect.left;
  const my = touch.clientY - rect.top;
  checkBodyTap(mx, my);
}, { passive:false });

// PC用クリックも対応
canvasEl.addEventListener('click', (e) => {
  const rect = canvasEl.getBoundingClientRect();
  checkBodyTap(e.clientX - rect.left, e.clientY - rect.top);
});

function checkBodyTap(mx, my) {
  // 背景タップでメニューを閉じる
  let hit = false;
  for (let i = physBodies.length - 1; i >= 0; i--) {
    const { body, food } = physBodies[i];
    const { x, y } = body.position;
    const sz = (body._sz || 42) * 1.3;
    if (Math.sqrt((mx-x)**2 + (my-y)**2) < sz) {
      showFoodMenu(food);
      hit = true;
      break;
    }
  }
  if (!hit) hideFoodMenu();
}

function toBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload  = () => res(r.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

async function analyzeFood(b64) {
  const prompt = `この料理の写真を見て、以下のJSON形式のみで答えてください。前後に余分な文字は一切不要です。
{"name":"料理名(日本語,短く)","emoji":"絵文字1文字","calories":推定kcal整数,"color":"#rrggbb","shape":"circle"}
shapeはすべてcircleでOKです。`;

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 200,
      messages: [{ role:'user', content:[
        { type:'image', source:{ type:'base64', media_type:'image/jpeg', data:b64 } },
        { type:'text', text:prompt }
      ]}]
    })
  });
  const data = await res.json();
  const txt  = data.content.map(i => i.text||'').join('');
  const json = txt.match(/\{[\s\S]*\}/);
  if (!json) throw new Error('JSON not found');
  return JSON.parse(json[0]);
}

const EMOJIS = ['🍙','🍱','🍜','🍣','🍛','🍔','🍕','🥗','🍰','🥩','🍳','🥞','🍞','🥪','🌮','🥘','🍲','🍝','🧆','🍦','☕','🥤','🍺','🍷'];
let pickerEmoji = { manual:'🍙', edit:'🍙', past:'🍙' };
let manualTargetDate = null; // null = 今日, 文字列 = 指定日

function buildPicker(containerId, key, initial) {
  pickerEmoji[key] = initial || '🍙';
  const c = document.getElementById(containerId);
  c.innerHTML = '';
  EMOJIS.forEach(em => {
    const b = document.createElement('button');
    b.className = 'emoji-opt' + (em === pickerEmoji[key] ? ' selected' : '');
    b.textContent = em;
    b.type = 'button';
    b.onclick = () => {
      pickerEmoji[key] = em;
      c.querySelectorAll('.emoji-opt').forEach(x => x.classList.remove('selected'));
      b.classList.add('selected');
    };
    c.appendChild(b);
  });
}

  document.getElementById('m-name').value  = '';
  document.getElementById('m-cal').value   = '';

let calDate = new Date();

function changeMonth(d) {
  calDate = new Date(calDate.getFullYear(), calDate.getMonth()+d, 1);
  renderCalendar();
}

function renderCalendar() {
  const year  = calDate.getFullYear();
  const month = calDate.getMonth();
  document.getElementById('cal-month-label').textContent = `${year}年 ${month+1}月`;

  const firstDay = new Date(year, month, 1).getDay();
  const lastDate  = new Date(year, month+1, 0).getDate();
  const store     = getStore();
  const grid      = document.getElementById('cal-grid');
  grid.innerHTML  = '';

  for (let i=0; i<firstDay; i++) {
    const c = document.createElement('div');
    c.className = 'cal-cell empty';
    grid.appendChild(c);
  }
  for (let d=1; d<=lastDate; d++) {
    const ds    = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const items = store[ds] || [];
    const cell  = document.createElement('div');
    cell.className = 'cal-cell' + (ds===todayKey()?' today':'') + (items.length?' has-data':'');

    const num = document.createElement('div');
    num.className = 'cal-day-num';
    num.textContent = d;
    cell.appendChild(num);

    if (items.length) {
      const em = document.createElement('div');
      em.className = 'cal-emojis';
      em.textContent = items.slice(0,4).map(i=>i.emoji).join('');
      cell.appendChild(em);

      const kc = document.createElement('div');
      kc.className = 'cal-kcal';
      kc.textContent = items.reduce((a,b)=>a+(b.calories||0),0) + 'kcal';
      cell.appendChild(kc);
    }

    // 全日付タップで開く（今日はtodayビュー、それ以外はdateビュー）
    if (ds === todayKey()) {
      cell.onclick = () => showView('today');
    } else {
      cell.onclick = () => openDateView(ds);
    }
    grid.appendChild(cell);
  }
}

// ══════════════════════════════════════
// DAY DETAIL
// ══════════════════════════════════════
let currentDetailDate = null;

function openDayDetail(ds) {
  currentDetailDate = ds;
  renderDayDetail(ds);
  document.getElementById('day-detail').classList.add('open');
}
function closeDayDetail() {
  document.getElementById('day-detail').classList.remove('open');
  currentDetailDate = null;
}

function openPastAddModal() {
  if (!currentDetailDate) return;
  closeDayDetail();
  setTimeout(() => openManualModal(currentDetailDate), 200);
}
function renderDayDetail(ds) {
  const items = getDay(ds);
  const [y,m,d] = ds.split('-');
  document.getElementById('day-detail-title').textContent = `📅 ${y}年${parseInt(m)}月${parseInt(d)}日の食事`;

  const total = items.reduce((a,b)=>a+(b.calories||0),0);
  document.getElementById('day-detail-summary').innerHTML = `
    <div class="ds-stat"><div class="ds-num">${items.length}</div><div class="ds-lbl">食事数</div></div>
    <div class="ds-stat"><div class="ds-num">${total}</div><div class="ds-lbl">総kcal</div></div>
    <div class="ds-stat"><div class="ds-num">${items.length?Math.round(total/items.length):0}</div><div class="ds-lbl">平均kcal</div></div>
  `;
  document.getElementById('day-detail-list').innerHTML = items.map(item => `
    <div class="detail-item">
      <div class="detail-emoji">${item.emoji||'🍽️'}</div>
      <div class="detail-info">
        <div class="detail-name">${item.name||''}</div>
        <div class="detail-cal">${item.calories||0} kcal</div>
      </div>
      <div class="detail-actions">
        <button class="icon-btn" data-edit="${ds}:${item.id}">✏️</button>
        <button class="icon-btn del" data-del="${ds}:${item.id}">🗑️</button>
      </div>
    </div>
  `).join('');

  // イベントをdelegationで設定
  document.getElementById('day-detail-list').onclick = (e) => {
    const editBtn = e.target.closest('[data-edit]');
    const delBtn  = e.target.closest('[data-del]');
    if (editBtn) {
      const [dateStr, id] = editBtn.dataset.edit.split(':');
      openEditModal(dateStr, parseInt(id));
    }
    if (delBtn) {
      const [dateStr, id] = delBtn.dataset.del.split(':');
      deleteItem(dateStr, parseInt(id));
    }
  };
}

// ══════════════════════════════════════
// GYROSCOPE
// ══════════════════════════════════════
let gyroEnabled = false;

function requestGyro() {
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    DeviceOrientationEvent.requestPermission()
      .then(s => s === 'granted' ? enableGyro() : showToast('❌ ジャイロの許可が必要です'))
      .catch(() => showToast('❌ ジャイロが使えません'));
  } else if ('DeviceOrientationEvent' in window) {
    enableGyro();
  } else {
    showToast('❌ このデバイスはジャイロ非対応です');
  }
}

function enableGyro() {
  if (gyroEnabled) {
    gyroEnabled = false;
    window.removeEventListener('deviceorientation', handleOrientation);
    engine.gravity.x = 0; engine.gravity.y = 1.5;
    dateEngine.gravity.x = 0; dateEngine.gravity.y = 1.5;
    document.getElementById('gyro-btn').classList.remove('gyro-on');
    document.getElementById('gyro-btn').textContent = '📱';
    document.getElementById('gyro-debug').style.display = 'none';
    showToast('📱 ジャイロ OFF');
    return;
  }
  gyroEnabled = true;
  window.addEventListener('deviceorientation', handleOrientation, true);
  document.getElementById('gyro-btn').classList.add('gyro-on');
  document.getElementById('gyro-btn').textContent = '🌀';
  showToast('🌀 ジャイロ ON！傾けてみて！');
}

function handleOrientation(e) {
  if (!gyroEnabled) return;
  const beta  = e.beta  || 0;
  const gamma = e.gamma || 0;

  // beta=80が縦持ち基準（実測値）
  // 上部を下に傾ける = beta増加 → 下に転がる(gy正)
  // 下部を下に傾ける = beta減少 → 上に転がる(gy負)
  const gx = Math.max(-2.5, Math.min(2.5,  gamma       / 20));
  const gy = Math.max(-2.0, Math.min(2.5, (beta - 80)  / 20));

  engine.gravity.x     = gx; engine.gravity.y     = gy;
  dateEngine.gravity.x = gx; dateEngine.gravity.y = gy;
}

// ══════════════════════════════════════
// TOAST
// ══════════════════════════════════════
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2600);
}

// ══════════════════════════════════════
// PWA / INIT
// ══════════════════════════════════════
function initPWA() {
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
  const c = document.createElement('canvas');
  c.width = c.height = 180;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#f5f0e8';
  ctx.beginPath(); ctx.roundRect(0,0,180,180,36); ctx.fill();
  ctx.font = '110px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('🍙', 90, 95);
  const icon = document.getElementById('apple-icon');
  if (icon) icon.href = c.toDataURL('image/png');
}

window.addEventListener('load', () => {
  // DOMレイアウト確定後に初期化
  setTimeout(() => {
    resizePhysics();
    reloadTodayPhysics();
    initPWA();
  }, 150);
});
</script>
